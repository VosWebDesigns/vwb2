<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#38bdf8" />
    <title>Vos Web Designs</title>
    <style>
      html {
        background: #0f172a;
        color: #ffffff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100svh;
        background: #0f172a;
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .ssr-fallback {
        min-height: 100vh;
        min-height: 100svh;
        background: linear-gradient(180deg, #0f172a 0%, #111827 50%, #0f172a 100%);
        overflow: hidden;
      }

      .ssr-fallback__header {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 50;
        background: rgba(15, 23, 42, 0.88);
      }

      .ssr-fallback__nav {
        box-sizing: border-box;
        width: min(100%, 1400px);
        margin: 0 auto;
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .ssr-fallback__brand,
      .ssr-fallback__highlight {
        color: #38bdf8;
      }

      @supports (-webkit-background-clip: text) or (background-clip: text) {
        .ssr-fallback__brand,
        .ssr-fallback__highlight {
          background: linear-gradient(90deg, #38bdf8, #60a5fa);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
      }

      .ssr-fallback__brand {
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 800;
        text-decoration: none;
      }

      .ssr-fallback__cta,
      .ssr-fallback__button {
        border-radius: 0.5rem;
        background: linear-gradient(90deg, #38bdf8, #60a5fa);
        color: #020617;
        font-weight: 700;
        text-decoration: none;
      }

      .ssr-fallback__cta {
        padding: 0.625rem 1rem;
      }

      .ssr-fallback__hero {
        box-sizing: border-box;
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 7rem 1.5rem 4rem;
        text-align: center;
      }

      .ssr-fallback__glow {
        position: absolute;
        inset: auto -8rem 4rem auto;
        width: 20rem;
        height: 20rem;
        border-radius: 9999px;
        background: rgba(56, 189, 248, 0.28);
        filter: blur(96px);
        pointer-events: none;
      }

      .ssr-fallback__content {
        position: relative;
        z-index: 1;
        max-width: 56rem;
      }

      .ssr-fallback__eyebrow {
        display: inline-block;
        margin: 0 0 1.5rem;
        border: 1px solid rgba(56, 189, 248, 0.3);
        border-radius: 9999px;
        background: rgba(56, 189, 248, 0.1);
        padding: 0.5rem 1rem;
        color: #38bdf8;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .ssr-fallback__title {
        margin: 0 0 1.5rem;
        font-size: clamp(2.5rem, 9vw, 4.5rem);
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .ssr-fallback__text {
        max-width: 42rem;
        margin: 0 auto 2rem;
        color: #d1d5db;
        font-size: clamp(1.125rem, 4vw, 1.25rem);
        line-height: 1.65;
      }

      .ssr-fallback__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
      }

      .ssr-fallback__button {
        display: inline-flex;
        padding: 1rem 2rem;
        font-size: 1.125rem;
      }

      .ssr-fallback__button--outline {
        border: 1px solid #38bdf8;
        background: transparent;
        color: #38bdf8;
      }

      @media (max-width: 640px) {
        .ssr-fallback__cta {
          display: none;
        }

        .ssr-fallback__nav {
          padding-inline: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="ssr-fallback" role="document">
        <header class="ssr-fallback__header">
          <nav class="ssr-fallback__nav" aria-label="Hoofdnavigatie">
            <a class="ssr-fallback__brand" href="/">Vos Web Designs</a>
            <a class="ssr-fallback__cta" href="/contact">Plan een Gesprek</a>
          </nav>
        </header>
        <main class="ssr-fallback__hero">
          <div class="ssr-fallback__glow" aria-hidden="true"></div>
          <section class="ssr-fallback__content" aria-label="Introductie">
            <p class="ssr-fallback__eyebrow">Professioneel Webdesign Bureau</p>
            <h1 class="ssr-fallback__title">Websites Die Uw <span class="ssr-fallback__highlight">Bedrijf Laten Groeien</span></h1>
            <p class="ssr-fallback__text">Wij ontwikkelen luxe, conversie-gerichte websites voor ambitieuze bedrijven in Nederland.</p>
            <div class="ssr-fallback__actions">
              <a class="ssr-fallback__button" href="/portfolio">Bekijk Ons Portfolio</a>
              <a class="ssr-fallback__button ssr-fallback__button--outline" href="/contact">Plan een Gesprek</a>
            </div>
          </section>
        </main>
      </div>
      <noscript>
        <style>.ssr-fallback { display: block; }</style>
      </noscript>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
